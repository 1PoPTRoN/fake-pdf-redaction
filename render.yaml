# Render Blueprint — declares the FastAPI backend as a free Web Service.
# Deploy: https://render.com/deploy (connect this repo, Render reads this file)
#
# Free tier limits:
#   - 512 MB RAM, 0.1 CPU
#   - Spins down after 15 min idle → first request after idle is slow (cold start)
#   - 750 hrs/month of runtime
#
# We cap upload size to 50 MB (under the 512 MB RAM ceiling after Python+libs load)
# and shrink the per-detector timeout to keep a single scan under the request limit.

services:
  - type: web
    name: pdfaudit-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: cd backend && pip install --upgrade pip && pip install uv && uv sync --extra dev
    startCommand: cd backend && uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      # 50 MB upload cap — comfortably under the free tier's 512 MB RAM after
      # Python + pikepdf + pdfminer load (~120 MB).
      - key: PDFAUDIT_MAX_FILE_BYTES
        value: "52428800"
      - key: PDFAUDIT_DETECTOR_TIMEOUT
        value: "45"
      # Comma-separated CORS allow-list. Replace with your Vercel URL after the
      # first frontend deploy (Vercel gives a stable *.vercel.app URL even on
      # the free plan). Multiple origins separated by commas, no spaces.
      - key: PDFAUDIT_CORS_ORIGINS
        value: "https://*.vercel.app,http://localhost:5174,http://127.0.0.1:5174"
      - key: PYTHONUNBUFFERED
        value: "1"